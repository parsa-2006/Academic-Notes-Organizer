{% extends 'courses/base.html' %}

{% block title %}ورود - سیستم مدیریت جزوات{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: #2c3e50;">🔐 ورود به سیستم</h2>
    
    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="message error" style="margin-bottom: 20px;">
                ❌ نام کاربری یا رمز عبور اشتباه است.
            </div>
        {% endif %}
        
        <div class="form-group">
            <label for="id_username">نام کاربری:</label>
            <input type="text" name="username" id="id_username" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="id_password">رمز عبور:</label>
            <input type="password" name="password" id="id_password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            ورود
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; color: #7f8c8d;">
        حساب کاربری ندارید؟ 
        <a href="{% url 'accounts:register' %}" style="color: #667eea; text-decoration: none; font-weight: 600;">
            ثبت‌نام کنید
        </a>
    </p>
</div>
{% endblock %}
